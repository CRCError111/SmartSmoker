<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиентный фон -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Тень для текста -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Фон с градиентом -->
  <rect width="512" height="512" rx="80" fill="url(#bgGradient)"/>
  
  <!-- Дым (3 волны) -->
  <g opacity="0.9" filter="url(#shadow)">
    <!-- Нижняя волна -->
    <path d="M 150 380 Q 180 360 210 380 T 270 380 T 330 380 T 390 380" 
          stroke="white" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Средняя волна -->
    <path d="M 140 320 Q 170 300 200 320 T 260 320 T 320 320 T 380 320" 
          stroke="white" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Верхняя волна -->
    <path d="M 130 260 Q 160 240 190 260 T 250 260 T 310 260 T 370 260" 
          stroke="white" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.8"/>
  </g>
  
  <!-- Коптильня (упрощённая) -->
  <g filter="url(#shadow)">
    <!-- Основание -->
    <rect x="180" y="350" width="152" height="120" rx="8" fill="white" opacity="0.95"/>
    
    <!-- Дверца -->
    <rect x="220" y="380" width="72" height="80" rx="6" fill="#ff6b35" opacity="0.8"/>
    
    <!-- Ручка -->
    <circle cx="256" cy="420" r="8" fill="white"/>
    
    <!-- Крыша -->
    <path d="M 160 350 L 256 300 L 352 350 Z" fill="white" opacity="0.95"/>
    
    <!-- Труба -->
    <rect x="236" y="260" width="40" height="50" rx="4" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Текст (опционально, можно удалить) -->
  <text x="256" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="bold" 
        fill="white" text-anchor="middle" filter="url(#shadow)">
    Smart
  </text>
  <text x="256" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" 
        fill="white" text-anchor="middle" filter="url(#shadow)">
    Smoker
  </text>
</svg>
