<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оффлайн - Smart Smoker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            text-align: center;
            max-width: 500px;
        }

        .offline-icon {
            font-size: 120px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ff6b35;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        .retry-button {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .retry-button:active {
            transform: translateY(0);
        }

        .info-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-top: 40px;
            backdrop-filter: blur(10px);
        }

        .info-box h3 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #ff6b35;
        }

        .info-box ul {
            list-style: none;
            text-align: left;
        }

        .info-box li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-box li:last-child {
            border-bottom: none;
        }

        .info-box li::before {
            content: "✓ ";
            color: #4caf50;
            font-weight: bold;
            margin-right: 10px;
        }

        @media (max-width: 600px) {
            .offline-icon {
                font-size: 80px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 16px;
            }

            .retry-button {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        
        <h1>Нет подключения к интернету</h1>
        
        <p>
            Не удалось загрузить страницу. Проверьте подключение к интернету и попробуйте снова.
        </p>

        <button class="retry-button" onclick="window.location.reload()">
            🔄 Повторить попытку
        </button>

        <div class="info-box">
            <h3>💡 Что можно сделать:</h3>
            <ul>
                <li>Проверьте WiFi или мобильные данные</li>
                <li>Перезагрузите роутер</li>
                <li>Попробуйте позже</li>
                <li>Некоторые данные доступны оффлайн</li>
            </ul>
        </div>
    </div>

    <script>
        // Автоматическая проверка подключения
        window.addEventListener('online', () => {
            console.log('Connection restored');
            window.location.reload();
        });

        // Проверка каждые 5 секунд
        setInterval(() => {
            if (navigator.onLine) {
                fetch('/', { method: 'HEAD', cache: 'no-cache' })
                    .then(() => {
                        window.location.reload();
                    })
                    .catch(() => {
                        console.log('Still offline');
                    });
            }
        }, 5000);
    </script>
</body>
</html>
